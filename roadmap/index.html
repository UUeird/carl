<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>carl — Roadmap</title>
<style>
  :root {
    --bg: #14171c; --panel: #1c2027; --panel-2: #232833; --line: #2e3540;
    --text: #e6e9ef; --dim: #9aa4b2; --faint: #6b7480;
    --done: #46c98a; --todo: #5b9cf0; --idea: #e8eaf0; --bug: #e0705f; --wip: #f0c040;
    --accent: #7c5cff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 17px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .wrap { margin: 0; padding: 28px 28px 80px; }
  button { font: inherit; }

  header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 22px; flex-wrap: wrap; }
  header h1 { margin: 0; font-size: 30px; letter-spacing: -0.01em; }
  .meta-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .chip {
    background: var(--panel-2); border: 1px solid var(--line); color: var(--dim);
    padding: 4px 10px; border-radius: 999px; font-size: 14px;
  }
  .chip b { color: var(--text); font-weight: 600; }

  /* progress bar + hover tooltip */
  .progress-wrap { position: relative; margin: 16px 0 22px; }
  .progress { height: 8px; background: var(--panel-2); border-radius: 999px; overflow: hidden; border: 1px solid var(--line); display: flex; cursor: default; }
  .progress > div { height: 100%; transition: width .4s ease; }
  .progress > .p-done { background: var(--done); }
  .progress > .p-wip  { background: var(--wip); }
  .progress > .p-todo { background: var(--todo); }
  .progress > .p-bug  { background: var(--bug); }
  .progress > .p-idea { background: var(--idea); }
  .progress-tooltip {
    display: none; position: absolute; bottom: calc(100% + 10px); left: 0;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 18px; gap: 20px; box-shadow: 0 4px 24px rgba(0,0,0,.4); z-index: 20;
  }
  .progress-wrap:hover .progress-tooltip { display: flex; }
  .pt-stat { text-align: center; min-width: 52px; }
  .pt-stat .pt-num { font-size: 26px; font-weight: 700; display: block; line-height: 1; }
  .pt-stat .pt-lbl { font-size: 12px; color: var(--faint); text-transform: uppercase; letter-spacing: .05em; margin-top: 4px; display: block; }
  .pt-stat.done .pt-num { color: var(--done); }
  .pt-stat.todo .pt-num { color: var(--todo); }
  .pt-stat.idea .pt-num { color: var(--idea); }
  .pt-stat.wip  .pt-num { color: var(--wip); }

  /* controls */
  .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 5; }
  #search {
    flex: 1; min-width: 180px; background: var(--panel-2); border: 1px solid var(--line);
    color: var(--text); padding: 9px 12px; border-radius: 8px; font-size: 16px;
  }
  #search:focus { outline: none; border-color: var(--accent); }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter {
    background: var(--panel-2); border: 1px solid var(--line); color: var(--dim);
    padding: 7px 14px; border-radius: 8px; font-size: 15px; cursor: pointer; user-select: none;
  }
  .filter:hover { border-color: var(--faint); }
  .filter.active { color: #fff; border-color: transparent; background: var(--accent); }
  .btn {
    background: var(--accent); color: #fff; border: none; padding: 9px 16px;
    border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 600;
  }
  .btn.ghost { background: var(--panel-2); color: var(--text); border: 1px solid var(--line); }
  .btn:hover { filter: brightness(1.08); }
  #saveStatus { font-size: 14px; color: var(--faint); min-width: 90px; }
  #saveStatus.saving { color: var(--idea); }
  #saveStatus.saved  { color: var(--done); }
  #saveStatus.error  { color: var(--bug); }

  /* kanban board */
  .board { display: flex; gap: 14px; align-items: flex-start; overflow-x: auto; padding-bottom: 24px; }
  .lane { flex: 1 1 270px; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; display: flex; flex-direction: column; }
  .lane-head { padding: 10px 14px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .lane-head:hover { background: var(--panel-2); border-radius: 9px 9px 0 0; }
  .lane.collapsed .lane-head { border-bottom: none; border-radius: 9px; flex-direction: column; align-items: center; justify-content: flex-start; padding: 14px 4px 10px; gap: 10px; height: 100%; }
  .lane.collapsed .lane-head:hover { border-radius: 9px; }
  .lane-head .count { color: var(--faint); font-size: 14px; margin-left: auto; }
  .lane.collapsed .lane-head .count { margin-left: 0; font-size: 15px; font-weight: 600; color: var(--dim); }
  .lane-head .arrow { color: var(--faint); font-size: 13px; transition: transform .2s; }
  .lane.collapsed .lane-head .arrow { display: none; }
  .lane.collapsed .lane-head .badge { writing-mode: vertical-lr; text-orientation: upright; letter-spacing: .08em; padding: 6px 3px; }
  .lane-body { padding: 8px; min-height: 80px; flex: 1; border-radius: 0 0 9px 9px; transition: background .12s; }
  .lane.collapsed .lane-body { display: none; }
  .lane.collapsed { flex: 0 0 38px; }
  .lane.drop-target .lane-body { background: var(--panel-2); }
  .lane.collapsed.drop-target { border-color: var(--accent); background: var(--panel-2); }
  .lane-empty { color: var(--faint); font-size: 15px; text-align: center; padding: 20px 8px; font-style: italic; pointer-events: none; }
  .lane-add-row { padding: 4px 2px 0; margin-top: 4px; }
  .lane-add-btn {
    background: none; border: none; color: var(--faint); font-size: 14px;
    cursor: pointer; font-family: inherit; padding: 6px 8px;
    width: 100%; text-align: left; border-radius: 6px;
  }
  .lane-add-btn:hover { color: var(--text); background: var(--panel-2); }

  /* cards */
  .card {
    position: relative;
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 32px 10px 10px; margin-bottom: 8px; border-left: 3px solid var(--line);
    cursor: grab; user-select: none;
    transition: opacity .15s, box-shadow .15s;
  }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: .35; box-shadow: none; }
  .card.drop-before { border-top: 2px solid var(--todo); margin-top: -2px; }
  .card.drop-after  { border-bottom: 2px solid var(--todo); }
  .card .actions {
    position: absolute; top: 6px; right: 6px;
    opacity: 0; transition: opacity .12s;
    display: flex; flex-direction: column; gap: 3px;
  }
  .card:hover .actions, .card:focus-within .actions { opacity: 1; }
  .iconbtn {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--line); background: var(--panel); color: var(--dim);
    font-size: 13px; cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .iconbtn:hover { color: #fff; border-color: var(--faint); }
  .iconbtn.del:hover { background: var(--bug); border-color: var(--bug); }
  .card-type { font-size: 12px; color: var(--faint); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
  .card-title { font-weight: 600; font-size: 15px; line-height: 1.4; }
  .badge { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; padding: 3px 8px; border-radius: 5px; font-weight: 700; white-space: nowrap; }
  .badge.done { background: rgba(70,201,138,.15);  color: var(--done); }
  .badge.todo { background: rgba(91,156,240,.15);  color: var(--todo); }
  .badge.idea { background: rgba(232,234,240,.12); color: var(--idea); }
  .badge.bug  { background: rgba(224,112,95,.15);  color: var(--bug); }
  .badge.wip  { background: rgba(240,192,64,.15);  color: var(--wip); }
  .card .note { color: var(--dim); margin: 5px 0 0; font-size: 15px; }
  .card ul { margin: 6px 0 0; padding-left: 16px; color: var(--dim); font-size: 15px; }
  .card ul li { margin: 2px 0; }
  .card-subtask-count { font-size: 13px; color: var(--faint); margin-top: 6px; }

  /* detail / focus view */
  .detail-wrap { margin: 40px 0 0; }
  .detail-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
  .detail-card { background: var(--panel); border-radius: 14px; padding: 32px 36px; }
  .detail-type { font-size: 13px; color: var(--faint); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  .detail-title {
    font-size: 26px; font-weight: 700; line-height: 1.35; margin: 10px 0 16px;
    cursor: text; border-radius: 5px; padding: 2px 4px; margin-left: -4px;
  }
  .detail-title:hover { background: var(--panel-2); }
  .detail-note {
    color: var(--dim); font-size: 16px; margin: 0 0 18px; line-height: 1.6;
    cursor: text; border-radius: 5px; padding: 2px 4px; margin-left: -4px;
  }
  .detail-note:hover { background: var(--panel-2); }
  .detail-note.placeholder { color: var(--faint); font-style: italic; }
  input.detail-edit, textarea.detail-edit {
    background: var(--panel-2); border: 1px solid var(--accent); color: var(--text);
    border-radius: 6px; padding: 4px 8px; font-family: inherit; outline: none; width: 100%;
  }
  input.detail-edit { font-size: 26px; font-weight: 700; }
  textarea.detail-edit { font-size: 16px; line-height: 1.6; resize: vertical; min-height: 56px; display: block; }

  /* child mini-kanban */
  .child-board { display: flex; gap: 8px; margin-top: 24px; }
  .child-lane { flex: 1; min-width: 0; background: rgba(0,0,0,.18); border-radius: 8px; padding: 8px; display: flex; flex-direction: column; }
  .child-lane-body { flex: 1; min-height: 60px; }
  .child-lane-head { display: flex; align-items: center; gap: 6px; padding: 2px 2px 8px; }
  .child-lane-head .child-count { margin-left: auto; color: var(--faint); font-size: 11px; }
  .child-lane.drop-target { background: var(--panel-2); }
  .child-card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 6px;
    padding: 7px 8px; margin-bottom: 5px; display: flex; align-items: flex-start; gap: 4px;
    cursor: grab; user-select: none; transition: opacity .15s;
  }
  .child-card:active { cursor: grabbing; }
  .child-card.dragging { opacity: .3; }
  .child-card.drop-before { border-top: 2px solid var(--todo); margin-top: -2px; }
  .child-card.drop-after  { border-bottom: 2px solid var(--todo); }
  .child-card-title { flex: 1; font-size: 15px; line-height: 1.4; cursor: text; }
  .child-card .del-child { opacity: 0; transition: opacity .12s; flex-shrink: 0; margin-top: 1px; }
  .child-card:hover .del-child { opacity: 1; }
  .child-add-row { margin-top: 2px; }
  .child-add-btn {
    background: none; border: none; color: var(--faint); font-size: 14px;
    cursor: pointer; font-family: inherit; padding: 3px 2px;
  }
  .child-add-btn:hover { color: var(--text); }
  .child-card input.detail-edit { font-size: 15px; font-weight: normal; padding: 2px 6px; }

  .error { background: #2a1c1c; border: 1px solid #5b2f2f; color: #f0c0b8; padding: 16px; border-radius: 10px; margin-top: 20px; }
  .error code { background: #00000044; padding: 1px 6px; border-radius: 4px; }
  footer { color: var(--faint); font-size: 12.5px; margin-top: 30px; border-top: 1px solid var(--line); padding-top: 14px; }
  .detail-timestamps { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line); }
  .detail-ts { font-size: 13px; color: var(--faint); display: flex; align-items: center; gap: 6px; }
  .detail-ts .ts-label { opacity: .75; }

  /* modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; z-index: 50; overflow: auto; }
  .modal { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; width: 100%; max-width: 560px; padding: 22px; }
  .modal h3 { margin: 0 0 14px; }
  .modal label { display: block; font-size: 14px; color: var(--dim); margin: 12px 0 4px; text-transform: uppercase; letter-spacing: .04em; }
  .modal input[type=text], .modal textarea, .modal select {
    width: 100%; background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
    border-radius: 8px; padding: 9px 11px; font-size: 16px; font-family: inherit;
  }
  .modal textarea { resize: vertical; min-height: 64px; }
  .modal .checkrow { display: flex; align-items: center; gap: 8px; margin-top: 14px; color: var(--dim); }
  .modal .row2 { display: flex; gap: 12px; }
  .modal .row2 > div { flex: 1; }
  .modal .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="title">carl — Roadmap</h1>
    <div class="meta-row" id="metaRow"></div>
  </header>
  <div id="app"></div>
</div>
<div id="modalRoot"></div>

<script>
const STATUS = { todo: "Planned", wip: "In Progress", done: "Done", idea: "Idea" };
const STATUS_PICKER = { idea: "Idea", todo: "Planned", wip: "In Progress", done: "Done" };
const TYPE_LABEL = { story: "Story", bug: "Bug" };
const COLS = [
  { status: "idea", label: "Idea" },
  { status: "todo", label: "Planned" },
  { status: "wip",  label: "In Progress" },
  { status: "done", label: "Done" },
];
const CHILD_COLS = [
  { status: "todo", label: "To Do" },
  { status: "wip",  label: "In Progress" },
  { status: "done", label: "Done" },
];
const API = "/api/roadmap";
const STATUS_COLOR = { todo: "#5b9cf0", wip: "#f0c040", done: "#46c98a", idea: "#e8eaf0" };
let DATA = null;
let activeType = "all";
let query = "";
let serverMode = true;
let collapsed = {};
let selectedIdx = null;
let didDrag = false;

function loadCollapsed() {
  try { collapsed = JSON.parse(localStorage.getItem("carl-roadmap-collapsed") || "{}"); } catch (_) {}
}
function loadSelectedIdx() {
  try { const v = localStorage.getItem("carl-roadmap-selected"); selectedIdx = v !== null ? +v : null; } catch (_) {}
}
function saveSelectedIdx() {
  try {
    if (selectedIdx !== null) localStorage.setItem("carl-roadmap-selected", selectedIdx);
    else localStorage.removeItem("carl-roadmap-selected");
  } catch (_) {}
}
function saveCollapsed() {
  try { localStorage.setItem("carl-roadmap-collapsed", JSON.stringify(collapsed)); } catch (_) {}
}

async function load() {
  try {
    let res;
    try {
      res = await fetch(API, { cache: "no-store" });
      if (!res.ok) throw new Error("api " + res.status);
    } catch (_) {
      serverMode = false;
      res = await fetch("roadmap.json", { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
    }
    DATA = await res.json();
    DATA.items.forEach(item => {
      if (item.children) {
        item.children = item.children.map(c =>
          typeof c === "string" ? { title: c, status: "todo" } : c
        );
      }
    });
    loadCollapsed();
    loadSelectedIdx();
    render();
  } catch (err) {
    document.getElementById("app").innerHTML =
      `<div class="error"><b>Couldn't load the roadmap.</b><br>${String(err)}<br><br>
       Run the editor server so changes can save:
       <br><code>python3 roadmap/server.py</code><br>
       then open <code>http://localhost:8770/</code></div>`;
  }
}

async function save() {
  if (!serverMode) { setStatus("read-only (run server.py to save)", "error"); return; }
  setStatus("Saving…", "saving");
  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(DATA),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    setStatus("Saved ✓", "saved");
  } catch (err) {
    setStatus("Save failed", "error");
    console.error(err);
  }
}

function setStatus(text, cls) {
  const el = document.getElementById("saveStatus");
  if (!el) return;
  el.textContent = text;
  el.className = cls || "";
  if (cls === "saved") setTimeout(() => { if (el.textContent === text) el.textContent = ""; }, 1800);
}

function matches(item) {
  if (activeType !== "all" && item.type !== activeType) return false;
  if (!query) return true;
  const hay = [item.title, item.note, ...(item.children || [])].join(" ").toLowerCase();
  return hay.includes(query);
}

function render() {
  document.getElementById("title").textContent = DATA.meta.title;
  document.getElementById("metaRow").innerHTML =
    `<span class="chip">Version <b>${escapeHTML(DATA.meta.version)}</b></span>
     <span class="chip">Updated <b>${escapeHTML(DATA.meta.updated)}</b></span>
     ${serverMode ? "" : '<span class="chip" style="color:var(--bug)">read-only</span>'}`;

  if (selectedIdx !== null) {
    const item = DATA.items[selectedIdx];
    if (!item) { selectedIdx = null; saveSelectedIdx(); return render(); }
    document.getElementById("app").innerHTML = detailHTML(item, selectedIdx);
    wireDetailEvents(selectedIdx);
    return;
  }

  const counts = { done: 0, todo: 0, wip: 0, idea: 0 };
  DATA.items.forEach(i => counts[i.status] !== undefined && counts[i.status]++);
  const total = counts.done + counts.todo + counts.wip + counts.idea || 1;
  const pct = s => (counts[s] / total * 100).toFixed(1);

  let html = `
    <div class="progress-wrap">
      <div class="progress">
        <div class="p-idea" style="width:${pct('idea')}%"></div>
        <div class="p-todo" style="width:${pct('todo')}%"></div>
        <div class="p-wip"  style="width:${pct('wip')}%"></div>
        <div class="p-done" style="width:${pct('done')}%"></div>
      </div>
      <div class="progress-tooltip">
        <div class="pt-stat idea"><span class="pt-num">${counts.idea}</span><span class="pt-lbl">Ideas</span></div>
        <div class="pt-stat todo"><span class="pt-num">${counts.todo}</span><span class="pt-lbl">Planned</span></div>
        <div class="pt-stat wip"><span class="pt-num">${counts.wip}</span><span class="pt-lbl">In Progress</span></div>
        <div class="pt-stat done"><span class="pt-num">${counts.done}</span><span class="pt-lbl">Done</span></div>
      </div>
    </div>

    <div class="controls">
      <input id="search" type="search" placeholder="Search the roadmap…" value="${escapeAttr(query)}">
      <div class="filters">
        ${[["all","All"],["story","Story"],["bug","Bug"]].map(([k,v]) =>
          `<div class="filter ${activeType===k?'active':''}" data-f="${k}">${v}</div>`
        ).join("")}
      </div>
      <button class="btn" id="addBtn">+ Add item</button>
      <span id="saveStatus"></span>
    </div>

    <div class="board">
      ${COLS.map(col => {
        const items = DATA.items
          .filter(i => i.status === col.status && matches(i));
        const isCollapsed = !!collapsed[col.status];
        return `<div class="lane ${isCollapsed ? 'collapsed' : ''}" data-status="${col.status}">
          <div class="lane-head" data-toggle="${col.status}">
            <span class="badge ${col.status}">${col.label}</span>
            <span class="count">${items.length}</span>
            <span class="arrow">▾</span>
          </div>
          <div class="lane-body" data-status="${col.status}">
            ${items.map(it => cardHTML(it)).join("")}
            ${items.length === 0 ? '<div class="lane-empty">Drop here</div>' : ""}
            ${serverMode ? `<div class="lane-add-row"><button class="lane-add-btn" data-add-status="${col.status}">+ Add item</button></div>` : ""}
          </div>
        </div>`;
      }).join("")}
    </div>`;

  html += `<footer>${serverMode
    ? "Editing here saves straight to <code>roadmap/roadmap.json</code>."
    : "Read-only — run <code>python3 roadmap/server.py</code> to edit."}
    Shipped changes are recorded in <code>CHANGELOG.md</code>.</footer>`;

  document.getElementById("app").innerHTML = html;
  wireEvents();
}

function childBoardHTML(item) {
  const children = item.children || [];
  return `<div class="child-board" id="childBoard">${CHILD_COLS.map(col => {
    const cards = children
      .map((c, i) => ({ c, i }))
      .filter(({ c }) => c.status === col.status);
    return `<div class="child-lane" data-status="${col.status}">
      <div class="child-lane-head">
        <span class="badge ${col.status}">${col.label}</span>
        <span class="child-count">${cards.length}</span>
      </div>
      <div class="child-lane-body" data-status="${col.status}">
        ${cards.map(({ c, i }) => `
          <div class="child-card" draggable="true" data-child-idx="${i}">
            <span class="child-card-title" data-child-idx="${i}">${escapeHTML(c.title)}</span>
            <button class="del-child iconbtn" data-child-idx="${i}" title="Remove">×</button>
          </div>`).join("")}
        <div class="child-add-row">
          <button class="child-add-btn" data-add-status="${col.status}">+ Add</button>
        </div>
      </div>
    </div>`;
  }).join("")}</div>`;
}

function detailHTML(item, idx) {
  const typeLabel = TYPE_LABEL[item.type] || item.type;
  const hex = STATUS_COLOR[item.status] || "#6b7480";
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const glow = `rgba(${r},${g},${b},0.22)`;
  const noteClass = item.note ? "detail-note" : "detail-note placeholder";
  const noteText = item.note ? escapeHTML(item.note) : "Add a description…";
  const delBtn = serverMode
    ? `<button class="btn ghost" id="detailDel" style="color:var(--bug);border-color:var(--bug)">Delete</button>` : "";
  const tStatus = relTime(item.statusChangedAt);
  const tEdited = relTime(item.updatedAt);
  const timestamps = (tStatus || tEdited) ? `<div class="detail-timestamps">
    ${tStatus ? `<span class="detail-ts"><span class="ts-label">Status changed</span>${tStatus}</span>` : ""}
    ${tEdited ? `<span class="detail-ts"><span class="ts-label">Edited</span>${tEdited}</span>` : ""}
  </div>` : "";
  return `<div class="detail-wrap">
    <div class="detail-controls">
      <button class="btn ghost" id="detailBack">← Back</button>
      <span style="flex:1"></span>
      ${delBtn}
    </div>
    <div class="detail-card" style="border:2.5px solid ${hex};box-shadow:0 0 0 6px ${glow},0 0 48px ${glow}">
      <div class="detail-type">${escapeHTML(typeLabel)}</div>
      <span class="badge ${item.status}">${STATUS[item.status] || item.status}</span>
      <div class="detail-title">${escapeHTML(item.title)}</div>
      <p class="${noteClass}">${noteText}</p>
      ${childBoardHTML(item)}
      ${timestamps}
    </div>
  </div>`;
}

function startInlineEdit(el, tag, value, onCommit) {
  const ed = document.createElement(tag);
  ed.className = "detail-edit";
  ed.value = value;
  if (tag === "textarea") ed.style.minHeight = Math.max(el.offsetHeight, 56) + "px";
  el.replaceWith(ed);
  ed.focus();
  if (tag === "input") ed.select();
  let done = false;
  const finish = (doSave) => {
    if (done) return;
    done = true;
    if (doSave) onCommit(ed.value);
    if (ed.parentNode) ed.replaceWith(el);
  };
  ed.addEventListener("blur", () => finish(true));
  ed.addEventListener("keydown", e => {
    if (tag === "input" && e.key === "Enter") { e.preventDefault(); finish(true); }
    if (e.key === "Escape") { e.stopPropagation(); finish(false); }
  });
}

function refreshChildBoard(item, idx) {
  const board = document.getElementById("childBoard");
  if (!board) return;
  board.outerHTML = childBoardHTML(item);
  wireChildBoard(item, idx);
}

function wireChildBoard(item, idx) {
  let childDragIdx = null;

  document.querySelectorAll(".child-card-title").forEach(span => {
    span.addEventListener("click", e => {
      e.stopPropagation();
      const ci = +span.dataset.childIdx;
      startInlineEdit(span, "input", item.children[ci].title, val => {
        const v = val.trim();
        if (v) { item.children[ci].title = v; span.textContent = v; item.updatedAt = now(); }
        else { item.children.splice(ci, 1); item.updatedAt = now(); refreshChildBoard(item, idx); }
        save();
      });
    });
  });

  document.querySelectorAll(".del-child").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      item.children.splice(+btn.dataset.childIdx, 1);
      item.updatedAt = now();
      save();
      refreshChildBoard(item, idx);
    });
  });

  document.querySelectorAll(".child-add-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      if (!item.children) item.children = [];
      const status = btn.dataset.addStatus || "todo";
      item.children.push({ title: "", status });
      item.updatedAt = now();
      save();
      refreshChildBoard(item, idx);
      const spans = document.querySelectorAll(".child-card-title");
      if (spans.length) spans[spans.length - 1].click();
    });
  });

  if (!serverMode) return;

  const clearChildDragUI = () => {
    document.querySelectorAll(".child-card").forEach(c => c.classList.remove("dragging", "drop-before", "drop-after"));
    document.querySelectorAll(".child-lane").forEach(l => l.classList.remove("drop-target"));
  };

  document.querySelectorAll(".child-card[draggable='true']").forEach(card => {
    card.addEventListener("dragstart", e => {
      childDragIdx = +card.dataset.childIdx;
      card.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.stopPropagation();
    });
    card.addEventListener("dragend", () => {
      childDragIdx = null;
      clearChildDragUI();
    });
    card.addEventListener("dragover", e => {
      e.preventDefault();
      e.stopPropagation();
      if (+card.dataset.childIdx === childDragIdx) return;
      clearChildDragUI();
      const rect = card.getBoundingClientRect();
      card.classList.add(e.clientY < rect.top + rect.height / 2 ? "drop-before" : "drop-after");
    });
    card.addEventListener("dragleave", e => {
      if (!card.contains(e.relatedTarget)) card.classList.remove("drop-before", "drop-after");
    });
    card.addEventListener("drop", e => {
      e.preventDefault();
      e.stopPropagation();
      const isBefore = card.classList.contains("drop-before");
      clearChildDragUI();
      const dropIdx = +card.dataset.childIdx;
      if (childDragIdx === null || childDragIdx === dropIdx) return;
      const dragged = item.children[childDragIdx];
      const target = item.children[dropIdx];
      dragged.status = target.status;
      item.children.splice(childDragIdx, 1);
      const newDrop = item.children.indexOf(target);
      item.children.splice(isBefore ? newDrop : newDrop + 1, 0, dragged);
      item.updatedAt = now();
      save();
      refreshChildBoard(item, idx);
    });
  });

  document.querySelectorAll(".child-lane-body").forEach(body => {
    body.addEventListener("dragover", e => {
      e.preventDefault();
      e.stopPropagation();
      clearChildDragUI();
      body.closest(".child-lane").classList.add("drop-target");
    });
    body.addEventListener("dragleave", e => {
      if (!body.contains(e.relatedTarget))
        body.closest(".child-lane").classList.remove("drop-target");
    });
    body.addEventListener("drop", e => {
      e.preventDefault();
      e.stopPropagation();
      body.closest(".child-lane").classList.remove("drop-target");
      if (childDragIdx === null) return;
      item.children[childDragIdx].status = body.dataset.status;
      item.updatedAt = now();
      save();
      refreshChildBoard(item, idx);
    });
  });
}

function wireDetailEvents(idx) {
  const item = DATA.items[idx];

  document.getElementById("detailBack").onclick = () => { selectedIdx = null; saveSelectedIdx(); render(); };
  const del = document.getElementById("detailDel");
  if (del) del.onclick = () => deleteItem(idx);

  if (!serverMode) return;

  const titleEl = document.querySelector(".detail-title");
  titleEl.addEventListener("click", () => {
    startInlineEdit(titleEl, "input", item.title, val => {
      if (val.trim() && val.trim() !== item.title) { item.title = val.trim(); item.updatedAt = now(); titleEl.textContent = item.title; save(); }
      else titleEl.textContent = item.title;
    });
  });

  const noteEl = document.querySelector(".detail-note");
  noteEl.addEventListener("click", () => {
    const isPlaceholder = noteEl.classList.contains("placeholder");
    startInlineEdit(noteEl, "textarea", isPlaceholder ? "" : item.note || "", val => {
      if (val.trim()) {
        if (val.trim() !== item.note) { item.note = val.trim(); item.updatedAt = now(); }
        noteEl.textContent = item.note;
        noteEl.classList.remove("placeholder");
      } else {
        if (item.note) { delete item.note; item.updatedAt = now(); }
        noteEl.textContent = "Add a description…";
        noteEl.classList.add("placeholder");
      }
      save();
    });
  });

  wireChildBoard(item, idx);
}

function cardHTML(item) {
  const idx = DATA.items.indexOf(item);
  const typeLabel = TYPE_LABEL[item.type] || item.type;
  const note = item.note ? `<p class="note">${escapeHTML(item.note)}</p>` : "";
  const actions = serverMode ? `
    <div class="actions">
      <button class="iconbtn del" data-idx="${idx}" title="Delete">×</button>
    </div>` : "";
  const hasKids = !!(item.children && item.children.length);
  const subtaskHint = hasKids
    ? `<div class="card-subtask-count">${item.children.length} subtask${item.children.length !== 1 ? "s" : ""}</div>` : "";
  return `<div class="card" draggable="${serverMode}" data-idx="${idx}">
    ${actions}
    <div class="card-type">${escapeHTML(typeLabel)}</div>
    <div class="card-title">${escapeHTML(item.title)}</div>
    ${note}
    ${subtaskHint}
  </div>`;
}

function wireEvents() {
  let dragIdx = null;

  const search = document.getElementById("search");
  search.oninput = e => { query = e.target.value.trim().toLowerCase(); render(); search.focus(); };
  search.setSelectionRange(search.value.length, search.value.length);

  document.querySelectorAll(".filter").forEach(f =>
    f.onclick = () => { activeType = f.dataset.f; render(); });

  document.querySelectorAll(".lane-head[data-toggle]").forEach(h =>
    h.onclick = () => { const s = h.dataset.toggle; collapsed[s] = !collapsed[s]; saveCollapsed(); render(); });

  const addBtn = document.getElementById("addBtn");
  if (addBtn) addBtn.onclick = () => openEditor(null);

  document.querySelectorAll(".lane-add-btn").forEach(b =>
    b.addEventListener("click", e => { e.stopPropagation(); openEditor(null, b.dataset.addStatus); }));

  document.querySelectorAll(".iconbtn.del").forEach(b =>
    b.onclick = e => { e.stopPropagation(); deleteItem(+b.dataset.idx); });

  document.querySelectorAll(".card").forEach(card => {
    card.addEventListener("pointerup", e => {
      if (e.target.closest(".iconbtn")) return;
      if (didDrag) return;
      selectedIdx = +card.dataset.idx;
      saveSelectedIdx();
      render();
    });
  });

  if (!serverMode) return;

  document.querySelectorAll(".card[draggable='true']").forEach(card => {
    card.addEventListener("dragstart", e => {
      didDrag = true;
      dragIdx = +card.dataset.idx;
      card.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });
    card.addEventListener("dragend", () => {
      dragIdx = null;
      document.querySelectorAll(".card").forEach(c => c.classList.remove("dragging", "drop-before", "drop-after"));
      document.querySelectorAll(".lane").forEach(l => l.classList.remove("drop-target"));
      document.addEventListener("pointerdown", () => { didDrag = false; }, { once: true });
    });
    card.addEventListener("dragover", e => {
      e.preventDefault();
      e.stopPropagation();
      if (+card.dataset.idx === dragIdx) return;
      document.querySelectorAll(".card").forEach(c => c.classList.remove("drop-before", "drop-after"));
      document.querySelectorAll(".lane").forEach(l => l.classList.remove("drop-target"));
      const rect = card.getBoundingClientRect();
      card.classList.add(e.clientY < rect.top + rect.height / 2 ? "drop-before" : "drop-after");
    });
    card.addEventListener("dragleave", e => {
      if (!card.contains(e.relatedTarget)) card.classList.remove("drop-before", "drop-after");
    });
    card.addEventListener("drop", e => {
      e.preventDefault();
      e.stopPropagation();
      const isBefore = card.classList.contains("drop-before");
      document.querySelectorAll(".card").forEach(c => c.classList.remove("drop-before", "drop-after"));
      const dropIdx = +card.dataset.idx;
      if (dragIdx === null || dragIdx === dropIdx) return;
      const dragged = DATA.items[dragIdx];
      const target = DATA.items[dropIdx];
      if (dragged.status !== target.status) dragged.statusChangedAt = now();
      dragged.status = target.status;
      DATA.items.splice(dragIdx, 1);
      const newDrop = DATA.items.indexOf(target);
      DATA.items.splice(isBefore ? newDrop : newDrop + 1, 0, dragged);
      render();
      save();
    });
  });

  document.querySelectorAll(".lane-body").forEach(body => {
    body.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      document.querySelectorAll(".lane").forEach(l => l.classList.remove("drop-target"));
      body.closest(".lane").classList.add("drop-target");
    });
    body.addEventListener("dragleave", e => {
      if (!body.contains(e.relatedTarget))
        body.closest(".lane").classList.remove("drop-target");
    });
    body.addEventListener("drop", e => {
      e.preventDefault();
      body.closest(".lane").classList.remove("drop-target");
      if (dragIdx === null) return;
      const dragged = DATA.items[dragIdx];
      if (!dragged) return;
      if (dragged.status !== body.dataset.status) dragged.statusChangedAt = now();
      dragged.status = body.dataset.status;
      render();
      save();
    });
  });

  document.querySelectorAll(".lane.collapsed").forEach(lane => {
    lane.addEventListener("dragover", e => {
      e.preventDefault();
      document.querySelectorAll(".lane").forEach(l => l.classList.remove("drop-target"));
      lane.classList.add("drop-target");
    });
    lane.addEventListener("dragleave", e => {
      if (!lane.contains(e.relatedTarget)) lane.classList.remove("drop-target");
    });
    lane.addEventListener("drop", e => {
      e.preventDefault();
      lane.classList.remove("drop-target");
      if (dragIdx === null) return;
      const dragged = DATA.items[dragIdx];
      if (!dragged) return;
      if (dragged.status !== lane.dataset.status) dragged.statusChangedAt = now();
      dragged.status = lane.dataset.status;
      render();
      save();
    });
  });
}

function deleteItem(idx) {
  const item = DATA.items[idx];
  if (!item) return;
  if (!confirm(`Delete this roadmap item?\n\n"${item.title}"\n\nThis can't be undone.`)) return;
  DATA.items.splice(idx, 1);
  selectedIdx = null;
  saveSelectedIdx();
  render();
  save();
}

function openEditor(idx, defaultStatus = "todo") {
  const isNew = idx === null;
  const item = isNew
    ? { title: "", note: "", status: defaultStatus, type: DATA.types[0].id, starred: false, children: [] }
    : JSON.parse(JSON.stringify(DATA.items[idx]));

  const typeOptions = DATA.types.map(s =>
    `<option value="${s.id}" ${item.type===s.id?"selected":""}>${escapeHTML(s.title)}</option>`).join("");
  const statusOptions = Object.entries(STATUS_PICKER).map(([k,v]) =>
    `<option value="${k}" ${item.status===k?"selected":""}>${v}</option>`).join("");

  document.getElementById("modalRoot").innerHTML = `
    <div class="overlay" id="overlay">
      <div class="modal">
        <h3>${isNew ? "Add item" : "Edit item"}</h3>
        <label>Title</label>
        <input type="text" id="f_title" value="${escapeAttr(item.title)}" placeholder="Short title">
        <label>Note (optional)</label>
        <textarea id="f_note" placeholder="One-line context">${escapeHTML(item.note || "")}</textarea>
        <div class="row2">
          <div>
            <label>Type</label>
            <select id="f_type">${typeOptions}</select>
          </div>
          <div>
            <label>Status</label>
            <select id="f_status">${statusOptions}</select>
          </div>
        </div>
        <label>Sub-items (one per line, optional)</label>
        <textarea id="f_children" placeholder="One bullet per line">${escapeHTML((item.children||[]).map(c => typeof c === "string" ? c : c.title).join("\n"))}</textarea>
        <div class="modal-actions">
          <button class="btn ghost" id="cancelBtn">Cancel</button>
          <button class="btn" id="saveItemBtn">${isNew ? "Add" : "Save"}</button>
        </div>
      </div>
    </div>`;

  const close = () => { document.getElementById("modalRoot").innerHTML = ""; };
  document.getElementById("cancelBtn").onclick = close;
  document.getElementById("overlay").onclick = e => { if (e.target.id === "overlay") close(); };
  document.getElementById("f_title").focus();

  document.getElementById("saveItemBtn").onclick = () => {
    const title = document.getElementById("f_title").value.trim();
    if (!title) { alert("Title is required."); return; }
    const edited = {
      title,
      note: document.getElementById("f_note").value.trim(),
      type: document.getElementById("f_type").value,
      status: document.getElementById("f_status").value,
      children: (() => {
        const existing = {};
        (item.children || []).forEach(c => { if (c && c.title) existing[c.title] = c.status; });
        return document.getElementById("f_children").value
          .split("\n").map(s => s.trim()).filter(Boolean)
          .map(t => ({ title: t, status: existing[t] || "todo" }));
      })(),
    };
    if (!edited.note) delete edited.note;
    if (!edited.children.length) delete edited.children;
    if (isNew) {
      edited.statusChangedAt = now();
      DATA.items.push(edited);
    } else {
      if (edited.status !== item.status) edited.statusChangedAt = now();
      else edited.statusChangedAt = item.statusChangedAt;
      if (edited.title !== item.title || edited.note !== item.note) edited.updatedAt = now();
      else edited.updatedAt = item.updatedAt;
      DATA.items[idx] = edited;
    }
    close();
    render();
    save();
  };
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape" && selectedIdx !== null) { selectedIdx = null; saveSelectedIdx(); render(); }
});

function escapeHTML(s) {
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function escapeAttr(s) { return escapeHTML(s).replace(/"/g, "&quot;"); }

function relTime(iso) {
  if (!iso) return null;
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return `${days}d ago`;
  const months = Math.floor(days / 30);
  if (months < 12) return `${months}mo ago`;
  return `${Math.floor(months / 12)}y ago`;
}
function now() { return new Date().toISOString(); }

load();
</script>
