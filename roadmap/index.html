<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>carl — Roadmap</title>
<style>
  :root {
    --bg: #14171c; --panel: #1c2027; --panel-2: #232833; --line: #2e3540;
    --text: #e6e9ef; --dim: #9aa4b2; --faint: #6b7480;
    --done: #46c98a; --todo: #5b9cf0; --idea: #e8eaf0; --debt: #e0705f; --wip: #f0c040;
    --accent: #7c5cff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .wrap { max-width: 980px; margin: 0 auto; padding: 28px 20px 80px; }
  button { font: inherit; }

  header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 22px; flex-wrap: wrap; }
  header h1 { margin: 0; font-size: 26px; letter-spacing: -0.01em; }
  .meta-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .chip {
    background: var(--panel-2); border: 1px solid var(--line); color: var(--dim);
    padding: 4px 10px; border-radius: 999px; font-size: 12.5px;
  }
  .chip b { color: var(--text); font-weight: 600; }

  /* dashboard */
  .dash { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 8px; }
  .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; }
  .stat .num { font-size: 26px; font-weight: 700; }
  .stat .lbl { color: var(--faint); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat.done .num { color: var(--done); } .stat.todo .num { color: var(--todo); }
  .stat.idea .num { color: var(--idea); } .stat.debt .num { color: var(--debt); }
  .stat.wip .num { color: var(--wip); }
  .progress { height: 8px; background: var(--panel-2); border-radius: 999px; overflow: hidden; margin: 16px 0 22px; border: 1px solid var(--line); display: flex; }
  .progress > div { height: 100%; transition: width .4s ease; }
  .progress > .p-done { background: var(--done); }
  .progress > .p-todo { background: var(--todo); }
  .progress > .p-idea { background: var(--idea); }
  .progress > .p-debt { background: var(--debt); }
  .progress > .p-wip  { background: var(--wip); }

  /* controls */
  .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 5; }
  #search {
    flex: 1; min-width: 180px; background: var(--panel-2); border: 1px solid var(--line);
    color: var(--text); padding: 9px 12px; border-radius: 8px; font-size: 14px;
  }
  #search:focus { outline: none; border-color: var(--accent); }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter {
    background: var(--panel-2); border: 1px solid var(--line); color: var(--dim);
    padding: 7px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; user-select: none;
  }
  .filter:hover { border-color: var(--faint); }
  .filter.active { color: #fff; border-color: transparent; }
  .filter.active[data-f="all"]  { background: var(--accent); }
  .filter.active[data-f="done"] { background: var(--done); color: #06150d; }
  .filter.active[data-f="todo"] { background: var(--todo); color: #04122b; }
  .filter.active[data-f="idea"] { background: var(--idea); color: #14161c; }
  .filter.active[data-f="debt"] { background: var(--debt); color: #1d0703; }
  .filter.active[data-f="wip"]  { background: var(--wip);  color: #1a1100; }
  .btn {
    background: var(--accent); color: #fff; border: none; padding: 8px 14px;
    border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .btn.ghost { background: var(--panel-2); color: var(--text); border: 1px solid var(--line); }
  .btn:hover { filter: brightness(1.08); }

  #saveStatus { font-size: 12.5px; color: var(--faint); min-width: 90px; }
  #saveStatus.saving { color: var(--idea); }
  #saveStatus.saved { color: var(--done); }
  #saveStatus.error { color: var(--debt); }

  /* sections + cards */
  section.group { margin-bottom: 26px; }
  .group-head { display: flex; align-items: baseline; gap: 10px; cursor: pointer; user-select: none; padding: 6px 0; }
  .group-head h2 { margin: 0; font-size: 19px; }
  .group-head .count { color: var(--faint); font-size: 13px; }
  .group-head .arrow { color: var(--faint); transition: transform .2s; margin-left: auto; }
  section.collapsed .group-body { display: none; }
  section.collapsed .arrow { transform: rotate(-90deg); }
  .group-desc { color: var(--faint); font-size: 13px; margin: 2px 0 10px; }

  .card {
    position: relative;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 44px 12px 38px; margin-bottom: 10px; border-left: 3px solid var(--line);
    transition: opacity .15s, box-shadow .15s;
  }
  .card.dragging { opacity: .4; }
  .card.drop-before { border-top: 2px solid var(--todo); margin-top: -2px; }
  .card.drop-after  { border-bottom: 2px solid var(--todo); }
  .card .grab {
    position: absolute; left: 0; top: 0; bottom: 0; width: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: grab; opacity: 0; transition: opacity .12s;
  }
  .card .grab .grab-icon { color: var(--faint); font-size: 14px; line-height: 1; }
  .card:hover .grab, .card:focus-within .grab { opacity: 1; }
  .card .actions {
    position: absolute; top: 8px; right: 8px;
    opacity: 0; transition: opacity .12s;
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 3px;
  }
  .card:hover .actions, .card:focus-within .actions { opacity: 1; }
  .iconbtn {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--line); background: var(--panel-2); color: var(--dim);
    font-size: 13px; line-height: 1; cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .iconbtn:hover { color: #fff; border-color: var(--faint); }
  .iconbtn.del:hover { background: var(--debt); border-color: var(--debt); }
  .iconbtn.star-btn { color: var(--faint); }
  .iconbtn.star-btn.starred { color: var(--idea); border-color: var(--idea); }
  .iconbtn.star-btn:hover { color: var(--idea); border-color: var(--idea); }
  .iconbtn:disabled { opacity: .3; cursor: default; }
  .card.s-done { border-left-color: var(--done); }
  .card.s-todo { border-left-color: var(--todo); }
  .card.s-idea { border-left-color: var(--idea); }
  .card.s-debt { border-left-color: var(--debt); }
  .card.s-wip  { border-left-color: var(--wip); }
  .card.starred { border-left-color: var(--idea); background: linear-gradient(180deg, rgba(232,234,240,.06), transparent 60%), var(--panel); }
  .card-title { font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .badge { font-size: 10.5px; text-transform: uppercase; letter-spacing: .06em; padding: 2px 7px; border-radius: 5px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
  .badge.done { background: rgba(70,201,138,.15);  color: var(--done); }
  .badge.todo { background: rgba(91,156,240,.15);  color: var(--todo); }
  .badge.idea { background: rgba(232,234,240,.12); color: var(--idea); }
  .badge.debt { background: rgba(224,112,95,.15);  color: var(--debt); }
  .badge.wip  { background: rgba(240,192,64,.15);  color: var(--wip); }
  .card .note { color: var(--dim); margin: 6px 0 0; font-size: 14px; }
  .card ul { margin: 8px 0 0; padding-left: 18px; color: var(--dim); }
  .card ul li { margin: 3px 0; }
  .star { color: var(--idea); }

  .add-row { margin: 4px 0 12px; }

  .empty { color: var(--faint); text-align: center; padding: 20px; font-style: italic; }
  .error { background: #2a1c1c; border: 1px solid #5b2f2f; color: #f0c0b8; padding: 16px; border-radius: 10px; margin-top: 20px; }
  .error code { background: #00000044; padding: 1px 6px; border-radius: 4px; }
  footer { color: var(--faint); font-size: 12.5px; margin-top: 30px; border-top: 1px solid var(--line); padding-top: 14px; }

  /* modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; z-index: 50; overflow: auto; }
  .modal { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; width: 100%; max-width: 560px; padding: 22px; }
  .modal h3 { margin: 0 0 14px; }
  .modal label { display: block; font-size: 12.5px; color: var(--dim); margin: 12px 0 4px; text-transform: uppercase; letter-spacing: .04em; }
  .modal input[type=text], .modal textarea, .modal select {
    width: 100%; background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
    border-radius: 8px; padding: 9px 11px; font-size: 14px; font-family: inherit;
  }
  .modal textarea { resize: vertical; min-height: 64px; }
  .modal .checkrow { display: flex; align-items: center; gap: 8px; margin-top: 14px; color: var(--dim); }
  .modal .row2 { display: flex; gap: 12px; }
  .modal .row2 > div { flex: 1; }
  .modal .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  .hint { color: var(--faint); font-size: 12px; margin-top: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="title">carl — Roadmap</h1>
    <div class="meta-row" id="metaRow"></div>
  </header>

  <div id="app"></div>
</div>
<div id="modalRoot"></div>

<script>
const STATUS = { todo: "To do", wip: "In Progress", idea: "Idea", done: "Done", debt: "Debt" };
const STATUS_PICKER = { todo: "To do", wip: "In Progress", idea: "Idea", done: "Done" };
const SEC_DESC = {
  later:     "Bigger bets, not yet scheduled.",
  debt:      "Things that work but aren't right yet.",
  ideas:     "Directions under consideration, not yet committed.",
  completed: "Shipped work, newest first.",
};
const API = "/api/roadmap";
let DATA = null;
let activeStatus = "all";
let query = "";
let serverMode = true;  // false when opened without the server (read-only)

async function load() {
  try {
    let res;
    try {
      res = await fetch(API, { cache: "no-store" });
      if (!res.ok) throw new Error("api " + res.status);
    } catch (_) {
      // Fallback: static file (read-only, no saving).
      serverMode = false;
      res = await fetch("roadmap.json", { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
    }
    DATA = await res.json();
    readHash();
    render();
    window.addEventListener("hashchange", () => { readHash(); render(); });
  } catch (err) {
    document.getElementById("app").innerHTML =
      `<div class="error"><b>Couldn't load the roadmap.</b><br>${String(err)}<br><br>
       Run the editor server so changes can save:
       <br><code>python3 roadmap/server.py</code><br>
       then open <code>http://localhost:8770/</code></div>`;
  }
}

async function save() {
  if (!serverMode) { setStatus("read-only (run server.py to save)", "error"); return; }
  setStatus("Saving…", "saving");
  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(DATA),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    setStatus("Saved ✓", "saved");
  } catch (err) {
    setStatus("Save failed", "error");
    console.error(err);
  }
}

function setStatus(text, cls) {
  const el = document.getElementById("saveStatus");
  if (!el) return;
  el.textContent = text;
  el.className = cls || "";
  if (cls === "saved") setTimeout(() => { if (el.textContent === text) el.textContent = ""; }, 1800);
}

function matches(item) {
  if (activeStatus !== "all" && item.status !== activeStatus) return false;
  if (!query) return true;
  const hay = [item.title, item.note, ...(item.children || [])].join(" ").toLowerCase();
  return hay.includes(query);
}

function render() {
  document.getElementById("title").textContent = DATA.meta.title;
  document.getElementById("metaRow").innerHTML =
    `<span class="chip">Version <b>${escapeHTML(DATA.meta.version)}</b></span>
     <span class="chip">Updated <b>${escapeHTML(DATA.meta.updated)}</b></span>
     ${serverMode ? "" : '<span class="chip" style="color:var(--debt)">read-only</span>'}`;

  const counts = { done: 0, todo: 0, wip: 0, idea: 0, debt: 0 };
  DATA.items.forEach(i => counts[i.status] !== undefined && counts[i.status]++);
  const total = counts.done + counts.todo + counts.wip + counts.debt || 1;
  const pct = s => (counts[s] / total * 100).toFixed(1);

  let html = `
    <div class="dash">
      <div class="stat done"><div class="num">${counts.done}</div><div class="lbl">Shipped</div></div>
      <div class="stat wip"><div class="num">${counts.wip}</div><div class="lbl">In Progress</div></div>
      <div class="stat todo"><div class="num">${counts.todo}</div><div class="lbl">Planned</div></div>
      <div class="stat debt"><div class="num">${counts.debt}</div><div class="lbl">Debt</div></div>
      <div class="stat idea"><div class="num">${counts.idea}</div><div class="lbl">Ideas</div></div>
    </div>
    <div title="${counts.done} shipped · ${counts.wip} in progress · ${counts.todo} planned · ${counts.debt} debt" class="progress">
      <div class="p-done" style="width:${pct('done')}%"></div>
      <div class="p-wip"  style="width:${pct('wip')}%"></div>
      <div class="p-todo" style="width:${pct('todo')}%"></div>
      <div class="p-debt" style="width:${pct('debt')}%"></div>
    </div>

    <div class="controls">
      <input id="search" type="search" placeholder="Search the roadmap…" value="${escapeAttr(query)}">
      <div class="filters">
        ${["all","wip","todo","debt","done","idea"].map(f =>
          `<div class="filter ${activeStatus===f?'active':''}" data-f="${f}">${f==="all"?"All":STATUS[f]}</div>`
        ).join("")}
      </div>
      <button class="btn" id="addBtn">+ Add item</button>
      <span id="saveStatus"></span>
    </div>
  `;

  let anyShown = false;
  DATA.sections.forEach(sec => {
    const items = DATA.items.filter(i => i.section === sec.id && matches(i))
      .sort((a, b) => (b.starred ? 1 : 0) - (a.starred ? 1 : 0));
    if (!items.length) return;
    anyShown = true;
    html += `<section class="group" data-sec="${sec.id}">
      <div class="group-head">
        <h2>${escapeHTML(sec.title)}</h2><span class="count">${items.length}</span>
        <span class="arrow">▾</span>
      </div>
      <div class="group-body">
        <div class="group-desc">${escapeHTML(SEC_DESC[sec.id] || "")}</div>
        ${items.map(it => cardHTML(it, sec.id)).join("")}
      </div>
    </section>`;
  });

  if (!anyShown) html += `<div class="empty">Nothing matches that filter / search.</div>`;

  html += `<footer>${serverMode
    ? "Editing here saves straight to <code>roadmap/roadmap.json</code>."
    : "Read-only — run <code>python3 roadmap/server.py</code> to edit."}
    Shipped changes are recorded in <code>CHANGELOG.md</code>.</footer>`;

  document.getElementById("app").innerHTML = html;
  wireEvents();
}

function cardHTML(item, secId) {
  const idx = DATA.items.indexOf(item);
  const sectionItems = DATA.items.filter(i => i.section === secId);
  const posInSec = sectionItems.indexOf(item);
  const starInTitle = item.starred ? `<span class="star">★</span> ` : "";
  const kids = (item.children && item.children.length)
    ? `<ul>${item.children.map(c => `<li>${escapeHTML(c)}</li>`).join("")}</ul>` : "";
  const note = item.note ? `<p class="note">${escapeHTML(item.note)}</p>` : "";
  const grab = serverMode ? `
    <div class="grab" title="Drag to reorder"><span class="grab-icon">⠿</span></div>` : "";
  const actions = serverMode ? `
    <div class="actions">
      <button class="iconbtn star-btn ${item.starred ? 'starred' : ''}" data-idx="${idx}" title="${item.starred ? 'Unstar' : 'Star'}">★</button>
      <button class="iconbtn del" data-idx="${idx}" title="Delete">×</button>
      <button class="iconbtn edit" data-idx="${idx}" title="Edit">✎</button>
    </div>` : "";
  return `<div class="card s-${item.status} ${item.starred ? 'starred' : ''}" draggable="${serverMode}" data-idx="${idx}">
    ${grab}
    ${actions}
    <div class="card-title">${starInTitle}<span class="badge ${item.status}">${STATUS[item.status]}</span> ${escapeHTML(item.title)}</div>
    ${note}${kids}
  </div>`;
}

function wireEvents() {
  const search = document.getElementById("search");
  search.oninput = e => { query = e.target.value.trim().toLowerCase(); render(); search.focus(); };
  search.setSelectionRange(search.value.length, search.value.length);

  document.querySelectorAll(".filter").forEach(f =>
    f.onclick = () => { activeStatus = f.dataset.f; syncHash(); render(); });

  document.querySelectorAll(".group-head").forEach(h =>
    h.onclick = () => h.closest("section").classList.toggle("collapsed"));

  const addBtn = document.getElementById("addBtn");
  if (addBtn) addBtn.onclick = () => openEditor(null);

  document.querySelectorAll(".iconbtn.star-btn").forEach(b =>
    b.onclick = e => { e.stopPropagation(); toggleStar(+b.dataset.idx); });
  document.querySelectorAll(".iconbtn.del").forEach(b =>
    b.onclick = e => { e.stopPropagation(); deleteItem(+b.dataset.idx); });
  document.querySelectorAll(".iconbtn.edit").forEach(b =>
    b.onclick = e => { e.stopPropagation(); openEditor(+b.dataset.idx); });

  // Drag-to-reorder within sections
  let dragIdx = null;
  document.querySelectorAll(".card[draggable='true']").forEach(card => {
    card.addEventListener("dragstart", e => {
      dragIdx = +card.dataset.idx;
      card.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });
    card.addEventListener("dragend", () => {
      dragIdx = null;
      document.querySelectorAll(".card").forEach(c => c.classList.remove("dragging", "drop-before", "drop-after"));
    });
    card.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      if (+card.dataset.idx === dragIdx) return;
      document.querySelectorAll(".card").forEach(c => c.classList.remove("drop-before", "drop-after"));
      const rect = card.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      card.classList.add(e.clientY < mid ? "drop-before" : "drop-after");
    });
    card.addEventListener("dragleave", e => {
      if (!card.contains(e.relatedTarget)) card.classList.remove("drop-before", "drop-after");
    });
    card.addEventListener("drop", e => {
      e.preventDefault();
      const isBefore = card.classList.contains("drop-before");
      document.querySelectorAll(".card").forEach(c => c.classList.remove("drop-before", "drop-after"));
      const dropIdx = +card.dataset.idx;
      if (dragIdx === null || dragIdx === dropIdx) return;
      const dragged = DATA.items[dragIdx];
      const target = DATA.items[dropIdx];
      if (dragged.section !== target.section) return;
      DATA.items.splice(dragIdx, 1);
      const newDrop = DATA.items.indexOf(target);
      DATA.items.splice(isBefore ? newDrop : newDrop + 1, 0, dragged);
      render();
      save();
    });
  });
}

function toggleStar(idx) {
  const item = DATA.items[idx];
  if (!item) return;
  if (item.starred) delete item.starred;
  else item.starred = true;
  render();
  save();
}

function deleteItem(idx) {
  const item = DATA.items[idx];
  if (!item) return;
  if (!confirm(`Delete this roadmap item?\n\n"${item.title}"\n\nThis can't be undone.`)) return;
  DATA.items.splice(idx, 1);
  render();
  save();
}

/* ---- editor modal ---- */
function openEditor(idx) {
  const isNew = idx === null;
  const item = isNew
    ? { title: "", note: "", status: "todo", section: DATA.sections[0].id, starred: false, children: [] }
    : JSON.parse(JSON.stringify(DATA.items[idx]));

  const secOptions = DATA.sections.map(s =>
    `<option value="${s.id}" ${item.section===s.id?"selected":""}>${escapeHTML(s.title)}</option>`).join("");
  const statusOptions = Object.entries(STATUS_PICKER).map(([k,v]) =>
    `<option value="${k}" ${item.status===k?"selected":""}>${v}</option>`).join("");

  document.getElementById("modalRoot").innerHTML = `
    <div class="overlay" id="overlay">
      <div class="modal">
        <h3>${isNew ? "Add item" : "Edit item"}</h3>
        <label>Title</label>
        <input type="text" id="f_title" value="${escapeAttr(item.title)}" placeholder="Short title">
        <label>Note (optional)</label>
        <textarea id="f_note" placeholder="One-line context">${escapeHTML(item.note || "")}</textarea>
        <div class="row2">
          <div>
            <label>Section</label>
            <select id="f_section">${secOptions}</select>
          </div>
          <div>
            <label>Status</label>
            <select id="f_status">${statusOptions}</select>
          </div>
        </div>
        <label>Sub-items (one per line, optional)</label>
        <textarea id="f_children" placeholder="One bullet per line">${escapeHTML((item.children||[]).join("\n"))}</textarea>
        <label class="checkrow"><input type="checkbox" id="f_starred" ${item.starred?"checked":""}> Star this item (highlight)</label>
        <div class="modal-actions">
          <button class="btn ghost" id="cancelBtn">Cancel</button>
          <button class="btn" id="saveItemBtn">${isNew ? "Add" : "Save"}</button>
        </div>
      </div>
    </div>`;

  const close = () => { document.getElementById("modalRoot").innerHTML = ""; };
  document.getElementById("cancelBtn").onclick = close;
  document.getElementById("overlay").onclick = e => { if (e.target.id === "overlay") close(); };
  document.getElementById("f_title").focus();

  document.getElementById("saveItemBtn").onclick = () => {
    const title = document.getElementById("f_title").value.trim();
    if (!title) { alert("Title is required."); return; }
    const edited = {
      title,
      note: document.getElementById("f_note").value.trim(),
      section: document.getElementById("f_section").value,
      status: document.getElementById("f_status").value,
      starred: document.getElementById("f_starred").checked,
      children: document.getElementById("f_children").value
        .split("\n").map(s => s.trim()).filter(Boolean),
    };
    if (!edited.note) delete edited.note;
    if (!edited.children.length) delete edited.children;
    if (!edited.starred) delete edited.starred;

    if (isNew) DATA.items.push(edited);
    else DATA.items[idx] = edited;
    close();
    render();
    save();
  };
}

function syncHash() { location.hash = activeStatus === "all" ? "" : activeStatus; }
function readHash() {
  const h = location.hash.replace("#", "");
  if (["done", "todo", "wip", "idea", "debt", "all"].includes(h)) activeStatus = h;
}
function escapeHTML(s) {
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function escapeAttr(s) { return escapeHTML(s).replace(/"/g, "&quot;"); }

load();
</script>
</body>
